[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.25"

[profile.local]
# eth_rpc_url = "${LC_RPC_URL}"
private_key = "${LC_PRIVATE_KEY}"

[profile.sepolia]
